[topstep]
# Demo environment (safe for testing)
rest_url = "https://gateway-api-demo.s2f.projectx.com"
market_hub = "https://gateway-rtc-demo.s2f.projectx.com/hubs/market"
user_hub = "https://gateway-rtc-demo.s2f.projectx.com/hubs/user"

# Live environment (uncomment when ready)
# rest_url = "https://api.topstepx.com"
# market_hub = "https://rtc.topstepx.com/hubs/market"
# user_hub = "https://rtc.topstepx.com/hubs/user"

[strategy]
instrument = "MES"
bar_interval_minutes = 5
max_trades_per_day = 10
max_hold_bars = 48

[risk]
# Topstep $50K — proven config (Sharpe 1.77 on MNQ)
max_daily_loss = 2000.0
max_total_loss = 2000.0
max_position_size = 5
risk_per_trade_pct = 0.40
max_risk_per_trade = 200.0
daily_loss_tier1 = 500.0
daily_loss_tier2 = 1000.0
weekly_loss_limit = 1500.0
max_simultaneous_positions = 2
flatten_time_ct = "15:00"
session_start_ct = "17:00"
consistency_target = 0.50

[backtest]
train_window_days = 180
val_window_days = 30
test_window_days = 30
walk_forward_step_days = 30
cost_per_side_per_contract = 0.62
slippage_ticks = 1
tick_size = 0.25
tick_value = 1.25
